<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Auth</title>
  <style>
    body { font-family: monospace; padding: 2em; background: #111; color: #eee; }
    #code { font-size: 1.2em; background: #222; padding: 1em; border-radius: 4px; word-break: break-all; }
    button { margin-top: 1em; padding: 0.5em 1em; cursor: pointer; }
  </style>
</head>
<body>
  <h2>TikTok Authorization</h2>
  <p>Copy the code below and paste it into your terminal:</p>
  <div id="code">Loading...</div>
  <button onclick="navigator.clipboard.writeText(document.getElementById('code').innerText)">Copy to clipboard</button>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      document.getElementById('code').innerText = code;
    } else {
      document.getElementById('code').innerText = 'No code found. Check that the redirect URI is correct.';
    }
  </script>
</body>
</html>
